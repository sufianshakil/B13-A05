<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <!-- Tailwind + daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">

</head>
<body>
    <section class="flex items-center justify-center h-screen bg-gray-100">
        <div class="bg-white shadow-xl p-10 rounded-xl">

            <div class="text-center items-center">
                <div class="flex justify-center mb-5">
                    <img src="./assets/github-logo.png" alt="">
                </div>
                

                <h1 class="text-3xl font-bold">GitHub Issues Tracker</h1>

                <p class="text-gray-500 mt-2">Sign in to manage your issues</p>

            </div>

            <div class="mt-6">
                <label class="">Username</label>
                <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full mb-3">

                <p class="text-sm text-purple-600 mb-3"> Default: admin</p>
                <label class="">Password</label>
                <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full mb-3">

                <p class="text-sm text-purple-600">Default: admin123</p>

                <button class="btn btn-primary w-full mt-4">Sign In</button>

            </div>

        </div>
    </section>
    
</body>
</html>
