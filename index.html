<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Tailwind + daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-gray-100">

    <!-- NAVBAR -->

<section class=" bg-white px-10 border-b border-gray-200 shadow-xl py-3">
    <div class="navbar flex justify-between items-center w-11/12 mx-auto">

<div class="flex items-center gap-3">
<div class="w-10">
    <img src="./assets/github-logo.png" alt="">
</div>
<div>
    <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
</div>

</div>

<div class="flex gap-2">

<input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered">

<button onclick="searchIssue()" class="btn btn-primary">Search</button>

</div>

</div>
</section>

<!-- TABS -->

<div class="flex gap-3 p-5 w-10/12 mx-auto bg-white px-10 border-b border-gray-200 mt-10 shadow-xl rounded-lg">

<button onclick="loadIssues()" class="btn btn-primary">All</button>

<button onclick="filterIssues('open')" class="btn">Open</button>

<button onclick="filterIssues('closed')" class="btn">Closed</button>

</div>

<!-- ISSUE COUNT -->
 <div class="w-10/12 mx-auto flex justify-between items-center bg-white px-10 border-b border-gray-200 mt-5 py-7 rounded-lg">
    <div class="flex items-center">
        <div>
            <img src="./assets/Aperture1.png" alt="">
        </div>
        <div class="ml-5">
            <h2 id="issueCount" class="text-2xl font-semibold"></h2>
            <p>Track and manage your project issues</p>
        </div>
    </div>
    <div>
        <img src="./assets/Frame.png" alt="">
    </div>
</div>


<!-- CARDS -->

<div id="issueContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-5 w-10/12 mx-auto">

</div>

<!-- MODAL -->

<dialog id="issueModal" class="modal">

<div class="modal-box">

<div id="modalContent"></div>

<div class="modal-action">

<form method="dialog">

<button class="btn">Close</button>

</form>

</div>

</div>

</dialog>

<script src="./script.js"></script>
</body>
</html>
